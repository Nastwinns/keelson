name: pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "site/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: site

      - name: Install trunk
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download -R trunk-rs/trunk --pattern '*-x86_64-unknown-linux-gnu.tar.gz' -O trunk.tar.gz
          tar xzf trunk.tar.gz
          sudo install trunk /usr/local/bin/trunk

      - name: Install mdBook
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download -R rust-lang/mdBook --pattern '*-x86_64-unknown-linux-gnu.tar.gz' -O mdbook.tar.gz
          tar xzf mdbook.tar.gz
          sudo install mdbook /usr/local/bin/mdbook

      - name: Install gettext + mdbook-i18n-helpers (French docs)
        run: |
          sudo apt-get update && sudo apt-get install -y gettext
          cargo install mdbook-i18n-helpers --version 0.4.0 --locked

      - name: Build the browser cockpit (Ratzilla / WASM)
        working-directory: site
        run: trunk build --release --public-url /hawser/try/

      - name: Build the docs (mdBook — English, then French under /fr/)
        working-directory: docs
        run: |
          mdbook build
          MDBOOK_BOOK__LANGUAGE=fr mdbook build -d book/fr

      - name: Assemble the Pages artifact
        run: |
          mkdir -p _site
          # Landing page is the site root
          cp -r landing/. _site/
          # Browser TUI demo (Ratzilla / WASM) at /try/
          mkdir -p _site/try
          cp -r site/dist/. _site/try/
          # mdBook docs at /docs/
          mkdir -p _site/docs
          cp -r docs/book/. _site/docs/

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

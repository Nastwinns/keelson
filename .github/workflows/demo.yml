name: demos

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - "crates/hawser/**"
      - "crates/haw-tui/**"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo build --release -p hawser
      - name: Install VHS
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          gh release download -R tsl0922/ttyd --pattern 'ttyd.x86_64' -O ttyd
          sudo install ttyd /usr/local/bin/ttyd
          gh release download -R charmbracelet/vhs --pattern '*Linux_x86_64.tar.gz' -O vhs.tar.gz
          mkdir vhs-dist && tar xzf vhs.tar.gz -C vhs-dist
          sudo install "$(find vhs-dist -name vhs -type f | head -1)" /usr/local/bin/vhs
      - name: Render demos
        run: |
          for tape in demo/*.tape; do
            echo "── rendering $tape ──"
            vhs "$tape"
          done
      - name: Commit rendered GIFs
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5.2.0
        with:
          commit_message: "demos: re-render VHS GIFs"
          file_pattern: "demo/*.gif"

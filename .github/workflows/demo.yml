name: demos

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - "crates/hawser/**"
      - "crates/haw-tui/**"

permissions:
  contents: write

concurrency:
  group: demos
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - run: cargo build --release -p hawser
      - name: Install VHS
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          gh release download -R tsl0922/ttyd --pattern 'ttyd.x86_64' -O ttyd
          sudo install ttyd /usr/local/bin/ttyd
          gh release download -R charmbracelet/vhs --pattern '*Linux_x86_64.tar.gz' -O vhs.tar.gz
          mkdir vhs-dist && tar xzf vhs.tar.gz -C vhs-dist
          sudo install "$(find vhs-dist -name vhs -type f | head -1)" /usr/local/bin/vhs
      - name: Render demos
        run: |
          for tape in demo/*.tape; do
            echo "── rendering $tape ──"
            vhs "$tape"
          done
      - name: Commit rendered GIFs (rebase + retry to survive concurrent pushes)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demo/*.gif
          if git diff --cached --quiet; then
            echo "no GIF changes — nothing to commit"
            exit 0
          fi
          git commit -m "demos: re-render VHS GIFs"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin main; then
              echo "pushed on attempt $attempt"; exit 0
            fi
            echo "push race, retrying ($attempt)…"; sleep 7
          done
          echo "::error::could not push rendered GIFs after retries"; exit 1

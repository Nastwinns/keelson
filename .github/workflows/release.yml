name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            musl: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install musl toolchain (x86_64 linux musl)
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release -p hawser --target ${{ matrix.target }}

      - name: Resolve version
        id: v
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VER="${{ steps.v.outputs.version }}"
          NAME="haw-${VER}-${{ matrix.target }}"
          DIR="target/${{ matrix.target }}/release"
          tar -czf "${NAME}.tar.gz" -C "$DIR" haw
          shasum -a 256 "${NAME}.tar.gz" | awk '{print $1}' > "${NAME}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ver = "${{ steps.v.outputs.version }}"
          $name = "haw-$ver-${{ matrix.target }}"
          $dir = "target/${{ matrix.target }}/release"
          Compress-Archive -Path "$dir/haw.exe" -DestinationPath "$name.zip"
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower() | Out-File -Encoding ascii -NoNewline "$name.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: haw-${{ matrix.target }}
          path: |
            haw-*.tar.gz
            haw-*.zip
            haw-*.sha256

  linux-packages:
    name: linux distro packages (.deb / .rpm)
    needs: build
    runs-on: ubuntu-latest
    # A packaging failure must not block the core release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-packages

      - name: Install cargo-deb and cargo-generate-rpm
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Build release binary (native gnu -> target/release/haw)
        run: cargo build --release -p hawser

      - name: Build .deb (reads [package.metadata.deb])
        shell: bash
        run: |
          set -euo pipefail
          cargo deb -p hawser --no-build
          mkdir -p pkg
          cp target/debian/*.deb pkg/

      - name: Build .rpm (reads [package.metadata.generate-rpm])
        shell: bash
        run: |
          set -euo pipefail
          cargo generate-rpm -p crates/hawser
          mkdir -p pkg
          cp target/generate-rpm/*.rpm pkg/

      - name: Checksums for packages
        shell: bash
        run: |
          set -euo pipefail
          cd pkg
          for f in *.deb *.rpm; do
            [ -e "$f" ] || continue
            shasum -a 256 "$f" | awk '{print $1}' > "${f}.sha256"
          done
          ls -l

      - uses: actions/upload-artifact@v4
        with:
          name: haw-linux-packages
          path: |
            pkg/*.deb
            pkg/*.rpm
            pkg/*.sha256

  release:
    needs: [build, linux-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve version
        id: v
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Render packaging manifests with real checksums
        run: |
          VER="${{ steps.v.outputs.version }}"
          cd artifacts
          sha() { cat "haw-${VER}-$1"; }
          python3 "$GITHUB_WORKSPACE/packaging/render.py" "$VER" \
            "$(sha aarch64-apple-darwin.tar.gz.sha256)" \
            "$(sha x86_64-apple-darwin.tar.gz.sha256)" \
            "$(sha x86_64-unknown-linux-gnu.tar.gz.sha256)" \
            "$(sha x86_64-pc-windows-msvc.zip.sha256)"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        continue-on-error: true

      - name: Sign archives with cosign (keyless, OIDC)
        continue-on-error: true
        env:
          COSIGN_YES: "true"
        run: |
          cd artifacts
          shopt -s nullglob
          for archive in haw-*.tar.gz haw-*.zip; do
            cosign sign-blob --yes \
              --output-signature "${archive}.sig" \
              --output-certificate "${archive}.pem" \
              "$archive"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name: haw ${{ steps.v.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.v.outputs.tag, '-') }}
          files: |
            artifacts/haw-*.tar.gz
            artifacts/haw-*.zip
            artifacts/haw-*.sha256
            artifacts/haw-*.sig
            artifacts/haw-*.pem
            artifacts/*.deb
            artifacts/*.rpm
            dist/hawser.rb
            dist/hawser.json

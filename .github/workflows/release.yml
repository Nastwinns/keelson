name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            musl: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install musl toolchain (x86_64 linux musl)
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release -p hawser --target ${{ matrix.target }}

      - name: Resolve version
        id: v
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VER="${{ steps.v.outputs.version }}"
          NAME="haw-${VER}-${{ matrix.target }}"
          DIR="target/${{ matrix.target }}/release"
          tar -czf "${NAME}.tar.gz" -C "$DIR" haw
          shasum -a 256 "${NAME}.tar.gz" | awk '{print $1}' > "${NAME}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ver = "${{ steps.v.outputs.version }}"
          $name = "haw-$ver-${{ matrix.target }}"
          $dir = "target/${{ matrix.target }}/release"
          Compress-Archive -Path "$dir/haw.exe" -DestinationPath "$name.zip"
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower() | Out-File -Encoding ascii -NoNewline "$name.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: haw-${{ matrix.target }}
          path: |
            haw-*.tar.gz
            haw-*.zip
            haw-*.sha256

  linux-packages:
    name: linux distro packages (.deb / .rpm)
    needs: build
    runs-on: ubuntu-latest
    # A packaging failure must not block the core release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-packages

      - name: Install cargo-deb and cargo-generate-rpm
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Build release binary (native gnu -> target/release/haw)
        run: cargo build --release -p hawser

      - name: Build .deb (reads [package.metadata.deb])
        shell: bash
        run: |
          set -euo pipefail
          cargo deb -p hawser --no-build
          mkdir -p pkg
          cp target/debian/*.deb pkg/

      - name: Build .rpm (reads [package.metadata.generate-rpm])
        shell: bash
        run: |
          set -euo pipefail
          cargo generate-rpm -p crates/hawser
          mkdir -p pkg
          cp target/generate-rpm/*.rpm pkg/

      - name: Checksums for packages
        shell: bash
        run: |
          set -euo pipefail
          cd pkg
          for f in *.deb *.rpm; do
            [ -e "$f" ] || continue
            shasum -a 256 "$f" | awk '{print $1}' > "${f}.sha256"
          done
          ls -l

      - uses: actions/upload-artifact@v4
        with:
          name: haw-linux-packages
          path: |
            pkg/*.deb
            pkg/*.rpm
            pkg/*.sha256

  release:
    needs: [build, linux-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve version
        id: v
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Render packaging manifests with real checksums
        run: |
          VER="${{ steps.v.outputs.version }}"
          cd artifacts
          sha() { cat "haw-${VER}-$1"; }
          python3 "$GITHUB_WORKSPACE/packaging/render.py" "$VER" \
            "$(sha aarch64-apple-darwin.tar.gz.sha256)" \
            "$(sha x86_64-apple-darwin.tar.gz.sha256)" \
            "$(sha x86_64-unknown-linux-gnu.tar.gz.sha256)" \
            "$(sha x86_64-pc-windows-msvc.zip.sha256)"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        continue-on-error: true

      - name: Sign archives with cosign (keyless, OIDC)
        continue-on-error: true
        env:
          COSIGN_YES: "true"
        run: |
          cd artifacts
          shopt -s nullglob
          for archive in haw-*.tar.gz haw-*.zip; do
            cosign sign-blob --yes \
              --output-signature "${archive}.sig" \
              --output-certificate "${archive}.pem" \
              "$archive"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name: haw ${{ steps.v.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.v.outputs.tag, '-') }}
          files: |
            artifacts/haw-*.tar.gz
            artifacts/haw-*.zip
            artifacts/haw-*.sha256
            artifacts/haw-*.sig
            artifacts/haw-*.pem
            artifacts/*.deb
            artifacts/*.rpm
            dist/hawser.rb
            dist/hawser.json

  distribute:
    name: distribute to private registries
    needs: [release]
    runs-on: ubuntu-latest
    # A registry upload failure must never fail the pipeline: the GitHub Release
    # has already published. Each step is additionally gated on its secrets.
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve version
        id: v
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: List files to distribute
        shell: bash
        run: ls -l artifacts

      # ------------------------------------------------------------------
      # 1. Nexus — raw hosted repository
      # ------------------------------------------------------------------
      - name: Publish to Nexus (raw hosted)
        continue-on-error: true
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASS }}
          NEXUS_REPO: ${{ secrets.NEXUS_REPO }}
          VERSION: ${{ steps.v.outputs.version }}
        shell: bash
        run: |
          set -uo pipefail
          if [ -z "${NEXUS_URL}" ] || [ -z "${NEXUS_USER}" ] || [ -z "${NEXUS_PASS}" ]; then
            echo "skipping Nexus: secret not set (need NEXUS_URL, NEXUS_USER, NEXUS_PASS)"
            exit 0
          fi
          REPO="${NEXUS_REPO:-raw-hosted}"
          BASE="${NEXUS_URL%/}/repository/${REPO}/haw/${VERSION}"
          cd artifacts
          shopt -s nullglob
          for f in haw-*.tar.gz haw-*.zip haw-*.sha256 haw-*.sig haw-*.pem *.deb *.rpm; do
            [ -e "$f" ] || continue
            echo "Nexus: uploading $f -> ${BASE}/$f"
            curl -fSs -u "${NEXUS_USER}:${NEXUS_PASS}" \
              --upload-file "$f" "${BASE}/$f"
          done
          echo "Nexus: done"

      # ------------------------------------------------------------------
      # 2. Artifactory — generic repository
      # ------------------------------------------------------------------
      - name: Publish to Artifactory (generic)
        continue-on-error: true
        env:
          ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          ARTIFACTORY_REPO: ${{ secrets.ARTIFACTORY_REPO }}
          VERSION: ${{ steps.v.outputs.version }}
        shell: bash
        run: |
          set -uo pipefail
          if [ -z "${ARTIFACTORY_URL}" ] || [ -z "${ARTIFACTORY_TOKEN}" ]; then
            echo "skipping Artifactory: secret not set (need ARTIFACTORY_URL, ARTIFACTORY_TOKEN)"
            exit 0
          fi
          REPO="${ARTIFACTORY_REPO:-generic-local}"
          BASE="${ARTIFACTORY_URL%/}/${REPO}/haw/${VERSION}"
          cd artifacts
          shopt -s nullglob
          for f in haw-*.tar.gz haw-*.zip haw-*.sha256 haw-*.sig haw-*.pem *.deb *.rpm; do
            [ -e "$f" ] || continue
            echo "Artifactory: uploading $f -> ${BASE}/$f"
            curl -fSs -H "Authorization: Bearer ${ARTIFACTORY_TOKEN}" \
              --upload-file "$f" "${BASE}/$f"
          done
          echo "Artifactory: done"

      # ------------------------------------------------------------------
      # 3. GitLab — generic package registry + GitLab Release
      # ------------------------------------------------------------------
      - name: Publish to GitLab (generic packages + release)
        continue-on-error: true
        env:
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
          VERSION: ${{ steps.v.outputs.version }}
          TAG: ${{ steps.v.outputs.tag }}
        shell: bash
        run: |
          set -uo pipefail
          if [ -z "${GITLAB_TOKEN}" ] || [ -z "${GITLAB_PROJECT_ID}" ]; then
            echo "skipping GitLab: secret not set (need GITLAB_TOKEN, GITLAB_PROJECT_ID)"
            exit 0
          fi
          API="${GITLAB_URL:-https://gitlab.com}"
          API="${API%/}/api/v4/projects/${GITLAB_PROJECT_ID}"
          PKG="${API}/packages/generic/haw/${VERSION}"
          cd artifacts
          shopt -s nullglob
          # Upload each file to the generic package registry, collecting asset links.
          LINKS=""
          for f in haw-*.tar.gz haw-*.zip haw-*.sha256 haw-*.sig haw-*.pem *.deb *.rpm; do
            [ -e "$f" ] || continue
            echo "GitLab: uploading $f -> ${PKG}/$f"
            curl -fSs --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
              --upload-file "$f" "${PKG}/$f"
            LINKS="${LINKS}{\"name\":\"$f\",\"url\":\"${PKG}/$f\"},"
          done
          LINKS="${LINKS%,}"
          # Create a GitLab Release pointing at the uploaded package links.
          echo "GitLab: creating release ${TAG}"
          BODY="{\"tag_name\":\"${TAG}\",\"name\":\"haw ${TAG}\",\"assets\":{\"links\":[${LINKS}]}}"
          HTTP=$(curl -sS -o /tmp/gl_release.json -w '%{http_code}' \
            --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            --header "Content-Type: application/json" \
            --request POST "${API}/releases" \
            --data "${BODY}") || true
          if [ "$HTTP" = "201" ]; then
            echo "GitLab: release created"
          elif grep -qi 'already exists' /tmp/gl_release.json 2>/dev/null; then
            echo "GitLab: release already exists, tolerating"
          else
            echo "GitLab: release POST returned HTTP ${HTTP}"
            cat /tmp/gl_release.json 2>/dev/null || true
          fi
          echo "GitLab: done"

      # ------------------------------------------------------------------
      # 4. Bitbucket — repository Downloads
      # ------------------------------------------------------------------
      - name: Publish to Bitbucket (downloads)
        continue-on-error: true
        env:
          BITBUCKET_USER: ${{ secrets.BITBUCKET_USER }}
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
          BITBUCKET_WORKSPACE: ${{ secrets.BITBUCKET_WORKSPACE }}
          BITBUCKET_REPO: ${{ secrets.BITBUCKET_REPO }}
        shell: bash
        run: |
          set -uo pipefail
          if [ -z "${BITBUCKET_USER}" ] || [ -z "${BITBUCKET_TOKEN}" ] \
             || [ -z "${BITBUCKET_WORKSPACE}" ] || [ -z "${BITBUCKET_REPO}" ]; then
            echo "skipping Bitbucket: secret not set (need BITBUCKET_USER, BITBUCKET_TOKEN, BITBUCKET_WORKSPACE, BITBUCKET_REPO)"
            exit 0
          fi
          URL="https://api.bitbucket.org/2.0/repositories/${BITBUCKET_WORKSPACE}/${BITBUCKET_REPO}/downloads"
          cd artifacts
          shopt -s nullglob
          for f in haw-*.tar.gz haw-*.zip haw-*.sha256 haw-*.sig haw-*.pem *.deb *.rpm; do
            [ -e "$f" ] || continue
            echo "Bitbucket: uploading $f -> ${URL}"
            curl -fSs -u "${BITBUCKET_USER}:${BITBUCKET_TOKEN}" \
              -X POST "${URL}" -F "files=@${f}"
          done
          echo "Bitbucket: done"

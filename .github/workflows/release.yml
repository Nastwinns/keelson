name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            musl: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          # Same cross-gcc links both the glibc and musl aarch64 targets (pure-Rust binary).
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install musl toolchain (x86_64 linux musl)
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release -p hawser --target ${{ matrix.target }}

      - name: Resolve version
        id: v
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VER="${{ steps.v.outputs.version }}"
          NAME="haw-${VER}-${{ matrix.target }}"
          DIR="target/${{ matrix.target }}/release"
          tar -czf "${NAME}.tar.gz" -C "$DIR" haw
          shasum -a 256 "${NAME}.tar.gz" | awk '{print $1}' > "${NAME}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ver = "${{ steps.v.outputs.version }}"
          $name = "haw-$ver-${{ matrix.target }}"
          $dir = "target/${{ matrix.target }}/release"
          Compress-Archive -Path "$dir/haw.exe" -DestinationPath "$name.zip"
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower() | Out-File -Encoding ascii -NoNewline "$name.zip.sha256"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: haw-${{ matrix.target }}
          path: |
            haw-*.tar.gz
            haw-*.zip
            haw-*.sha256

  linux-packages:
    name: linux distro packages (.deb / .rpm)
    needs: build
    runs-on: ubuntu-latest
    # A packaging failure must not block the core release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: linux-packages

      - name: Install cargo-deb and cargo-generate-rpm
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Build release binary (native gnu -> target/release/haw)
        run: cargo build --release -p hawser

      - name: Build .deb (reads [package.metadata.deb])
        shell: bash
        run: |
          set -euo pipefail
          cargo deb -p hawser --no-build
          mkdir -p pkg
          cp target/debian/*.deb pkg/

      - name: Build .rpm (reads [package.metadata.generate-rpm])
        shell: bash
        run: |
          set -euo pipefail
          # RPM Version cannot contain '-' (it separates version-release); a
          # pre-release like 0.1.3-beta.1 must become 0.1.3~beta.1 for rpm.
          VER=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          RPMVER=${VER//-/~}
          cargo generate-rpm -p crates/hawser -s "version = \"${RPMVER}\""
          mkdir -p pkg
          cp target/generate-rpm/*.rpm pkg/

      - name: Checksums for packages
        shell: bash
        run: |
          set -euo pipefail
          cd pkg
          for f in *.deb *.rpm; do
            [ -e "$f" ] || continue
            shasum -a 256 "$f" | awk '{print $1}' > "${f}.sha256"
          done
          ls -l

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: haw-linux-packages
          path: |
            pkg/*.deb
            pkg/*.rpm
            pkg/*.sha256

  release:
    needs: [build, linux-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve version
        id: v
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Render packaging manifests with real checksums
        run: |
          VER="${{ steps.v.outputs.version }}"
          cd artifacts
          sha() { cat "haw-${VER}-$1"; }
          python3 "$GITHUB_WORKSPACE/packaging/render.py" "$VER" \
            "$(sha aarch64-apple-darwin.tar.gz.sha256)" \
            "$(sha x86_64-apple-darwin.tar.gz.sha256)" \
            "$(sha x86_64-unknown-linux-gnu.tar.gz.sha256)" \
            "$(sha x86_64-pc-windows-msvc.zip.sha256)"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        continue-on-error: true

      - name: Sign archives with cosign (keyless, OIDC)
        continue-on-error: true
        env:
          COSIGN_YES: "true"
        run: |
          cd artifacts
          shopt -s nullglob
          for archive in haw-*.tar.gz haw-*.zip; do
            cosign sign-blob --yes \
              --output-signature "${archive}.sig" \
              --output-certificate "${archive}.pem" \
              "$archive"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name: haw ${{ steps.v.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.v.outputs.tag, '-') }}
          files: |
            artifacts/haw-*.tar.gz
            artifacts/haw-*.zip
            artifacts/haw-*.sha256
            artifacts/haw-*.sig
            artifacts/haw-*.pem
            artifacts/*.deb
            artifacts/*.rpm
            dist/hawser.rb
            dist/hawser.json

      - name: Bump install version in README on default branch
        continue-on-error: true
        env:
          VER: ${{ steps.v.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          # Rewrite both version fields in the release-download install line.
          sed -i -E \
            "s#releases/download/v[0-9]+\.[0-9]+\.[0-9]+/haw-[0-9]+\.[0-9]+\.[0-9]+-#releases/download/v${VER}/haw-${VER}-#g" \
            README.md
          if git diff --quiet -- README.md; then
            echo "README already at v${VER}, nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): bump install version to v${VER}"
          git push origin "HEAD:${BRANCH}"

  distribute:
    name: distribute to private registries
    needs: [release]
    runs-on: ubuntu-latest
    # A registry upload failure must never fail the pipeline: the GitHub Release
    # has already published. Each step is additionally gated on its secrets.
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve version
        id: v
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: List files to distribute
        shell: bash
        run: ls -l artifacts

      # ------------------------------------------------------------------
      # 1. Nexus — raw hosted repository
      # ------------------------------------------------------------------
      - name: Publish to Nexus (raw hosted)
        continue-on-error: true
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASS }}
          NEXUS_REPO: ${{ secrets.NEXUS_REPO }}
          VERSION: ${{ steps.v.outputs.version }}
        shell: bash
        run: |
          set -uo pipefail
          if [ -z "${NEXUS_URL}" ] || [ -z "${NEXUS_USER}" ] || [ -z "${NEXUS_PASS}" ]; then
            echo "skipping Nexus: secret not set (need NEXUS_URL, NEXUS_USER, NEXUS_PASS)"
            exit 0
          fi
          REPO="${NEXUS_REPO:-raw-hosted}"
          BASE="${NEXUS_URL%/}/repository/${REPO}/haw/${VERSION}"
          cd artifacts
          shopt -s nullglob
          for f in haw-*.tar.gz haw-*.zip haw-*.sha256 haw-*.sig haw-*.pem *.deb *.rpm; do
            [ -e "$f" ] || continue
            echo "Nexus: uploading $f -> ${BASE}/$f"
            curl -fSs -u "${NEXUS_USER}:${NEXUS_PASS}" \
              --upload-file "$f" "${BASE}/$f"
          done
          echo "Nexus: done"

      # ------------------------------------------------------------------
      # 2. Artifactory — generic repository
      # ------------------------------------------------------------------
      - name: Publish to Artifactory (generic)
        continue-on-error: true
        env:
          ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          ARTIFACTORY_REPO: ${{ secrets.ARTIFACTORY_REPO }}
          VERSION: ${{ steps.v.outputs.version }}
        shell: bash
        run: |
          set -uo pipefail
          if [ -z "${ARTIFACTORY_URL}" ] || [ -z "${ARTIFACTORY_TOKEN}" ]; then
            echo "skipping Artifactory: secret not set (need ARTIFACTORY_URL, ARTIFACTORY_TOKEN)"
            exit 0
          fi
          REPO="${ARTIFACTORY_REPO:-generic-local}"
          BASE="${ARTIFACTORY_URL%/}/${REPO}/haw/${VERSION}"
          cd artifacts
          shopt -s nullglob
          for f in haw-*.tar.gz haw-*.zip haw-*.sha256 haw-*.sig haw-*.pem *.deb *.rpm; do
            [ -e "$f" ] || continue
            echo "Artifactory: uploading $f -> ${BASE}/$f"
            curl -fSs -H "Authorization: Bearer ${ARTIFACTORY_TOKEN}" \
              --upload-file "$f" "${BASE}/$f"
          done
          echo "Artifactory: done"

      # ------------------------------------------------------------------
      # 3. GitLab — generic package registry + GitLab Release
      # ------------------------------------------------------------------
      - name: Publish to GitLab (generic packages + release)
        continue-on-error: true
        env:
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
          VERSION: ${{ steps.v.outputs.version }}
          TAG: ${{ steps.v.outputs.tag }}
        shell: bash
        run: |
          set -uo pipefail
          if [ -z "${GITLAB_TOKEN}" ] || [ -z "${GITLAB_PROJECT_ID}" ]; then
            echo "skipping GitLab: secret not set (need GITLAB_TOKEN, GITLAB_PROJECT_ID)"
            exit 0
          fi
          API="${GITLAB_URL:-https://gitlab.com}"
          API="${API%/}/api/v4/projects/${GITLAB_PROJECT_ID}"
          PKG="${API}/packages/generic/haw/${VERSION}"
          cd artifacts
          shopt -s nullglob
          # Upload each file to the generic package registry, collecting asset links.
          LINKS=""
          for f in haw-*.tar.gz haw-*.zip haw-*.sha256 haw-*.sig haw-*.pem *.deb *.rpm; do
            [ -e "$f" ] || continue
            echo "GitLab: uploading $f -> ${PKG}/$f"
            curl -fSs --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
              --upload-file "$f" "${PKG}/$f"
            LINKS="${LINKS}{\"name\":\"$f\",\"url\":\"${PKG}/$f\"},"
          done
          LINKS="${LINKS%,}"
          # Create a GitLab Release pointing at the uploaded package links.
          echo "GitLab: creating release ${TAG}"
          BODY="{\"tag_name\":\"${TAG}\",\"name\":\"haw ${TAG}\",\"assets\":{\"links\":[${LINKS}]}}"
          HTTP=$(curl -sS -o /tmp/gl_release.json -w '%{http_code}' \
            --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            --header "Content-Type: application/json" \
            --request POST "${API}/releases" \
            --data "${BODY}") || true
          if [ "$HTTP" = "201" ]; then
            echo "GitLab: release created"
          elif grep -qi 'already exists' /tmp/gl_release.json 2>/dev/null; then
            echo "GitLab: release already exists, tolerating"
          else
            echo "GitLab: release POST returned HTTP ${HTTP}"
            cat /tmp/gl_release.json 2>/dev/null || true
          fi
          echo "GitLab: done"

      # ------------------------------------------------------------------
      # 4. Bitbucket — repository Downloads
      # ------------------------------------------------------------------
      - name: Publish to Bitbucket (downloads)
        continue-on-error: true
        env:
          BITBUCKET_USER: ${{ secrets.BITBUCKET_USER }}
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
          BITBUCKET_WORKSPACE: ${{ secrets.BITBUCKET_WORKSPACE }}
          BITBUCKET_REPO: ${{ secrets.BITBUCKET_REPO }}
        shell: bash
        run: |
          set -uo pipefail
          if [ -z "${BITBUCKET_USER}" ] || [ -z "${BITBUCKET_TOKEN}" ] \
             || [ -z "${BITBUCKET_WORKSPACE}" ] || [ -z "${BITBUCKET_REPO}" ]; then
            echo "skipping Bitbucket: secret not set (need BITBUCKET_USER, BITBUCKET_TOKEN, BITBUCKET_WORKSPACE, BITBUCKET_REPO)"
            exit 0
          fi
          URL="https://api.bitbucket.org/2.0/repositories/${BITBUCKET_WORKSPACE}/${BITBUCKET_REPO}/downloads"
          cd artifacts
          shopt -s nullglob
          for f in haw-*.tar.gz haw-*.zip haw-*.sha256 haw-*.sig haw-*.pem *.deb *.rpm; do
            [ -e "$f" ] || continue
            echo "Bitbucket: uploading $f -> ${URL}"
            curl -fSs -u "${BITBUCKET_USER}:${BITBUCKET_TOKEN}" \
              -X POST "${URL}" -F "files=@${f}"
          done
          echo "Bitbucket: done"

  # ====================================================================
  # Promote to the public package managers — STABLE tags only.
  # A pre-release tag (contains '-', e.g. v0.1.3-beta.1) is skipped, so
  # `brew`/`scoop` users only ever see stable versions. Gated on the tap
  # token so a fork without it degrades gracefully.
  # ====================================================================
  homebrew:
    name: update Homebrew tap (stable only)
    needs: [release]
    if: ${{ !contains(github.event.inputs.tag || github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: v
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - name: Push formula to Nastwinns/homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.v.outputs.tag }}
        shell: bash
        run: |
          set -uo pipefail
          if [ -z "${TAP_TOKEN}" ]; then
            echo "skipping Homebrew tap: HOMEBREW_TAP_TOKEN not set"; exit 0
          fi
          gh release download "$TAG" -R Nastwinns/hawser -p hawser.rb -D dist --clobber
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/Nastwinns/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp dist/hawser.rb tap/Formula/hawser.rb
          cd tap
          git config user.name "haw-release-bot"
          git config user.email "noreply@users.noreply.github.com"
          git add Formula/hawser.rb
          git commit -m "hawser ${TAG#v}" || { echo "tap already up to date"; exit 0; }
          git push
          echo "Homebrew tap updated to ${TAG}"

  scoop:
    name: update Scoop bucket (stable only)
    needs: [release]
    if: ${{ !contains(github.event.inputs.tag || github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: v
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - name: Push manifest to Nastwinns/scoop-bucket
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.v.outputs.tag }}
        shell: bash
        run: |
          set -uo pipefail
          if [ -z "${TAP_TOKEN}" ]; then
            echo "skipping Scoop bucket: HOMEBREW_TAP_TOKEN not set"; exit 0
          fi
          gh release download "$TAG" -R Nastwinns/hawser -p hawser.json -D dist --clobber
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/Nastwinns/scoop-bucket.git" bucket
          mkdir -p bucket/bucket
          cp dist/hawser.json bucket/bucket/hawser.json
          cd bucket
          git config user.name "haw-release-bot"
          git config user.email "noreply@users.noreply.github.com"
          git add bucket/hawser.json
          git commit -m "hawser ${TAG#v}" || { echo "bucket already up to date"; exit 0; }
          git push
          echo "Scoop bucket updated to ${TAG}"
